<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train / Test Split — Which Method When?</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06090f; --bg-card: #0d1117; --bg-raised: #161b22;
  --border: #21262d; --text: #e6edf3; --text-dim: #8b949e; --text-muted: #484f58;
  --cyan: #39d2ff; --amber: #ffb347; --green: #3fb950; --red: #f85149;
  --violet: #a371f7;
}
body.light {
  --bg: #f6f8fa; --bg-card: #ffffff; --bg-raised: #e8ecf0;
  --border: #d0d7de; --text: #1f2328; --text-dim: #656d76; --text-muted: #8b949e;
  --cyan: #0969da; --amber: #9a6700; --green: #1a7f37; --red: #cf222e; --violet: #8250df;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.3s, color 0.3s; }
.theme-toggle { position: fixed; top: 1rem; right: 1.5rem; z-index: 999; background: var(--bg-raised); border: 1px solid var(--border); color: var(--text); font-size: 1.1rem; cursor: pointer; padding: 0.35rem 0.6rem; border-radius: 6px; font-family: 'JetBrains Mono', monospace; }
.theme-toggle:hover { border-color: var(--cyan); color: var(--cyan); }
.app { max-width: 1000px; margin: 0 auto; padding: 1.5rem; }

.header { text-align: center; padding: 1.5rem 0 0.5rem; }
.header h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(1.1rem, 3vw, 1.6rem); background: linear-gradient(135deg, var(--cyan), var(--violet)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.3rem; }
.header p { color: var(--text-dim); font-size: 0.85rem; }

/* ── Scenario Selector ── */
.scenario-tabs { display: flex; gap: 0.5rem; justify-content: center; margin: 1rem 0; flex-wrap: wrap; }
.scenario-tab { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; padding: 0.6rem 1.2rem; border-radius: 100px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-dim); cursor: pointer; transition: 0.2s; }
.scenario-tab:hover { border-color: var(--cyan); color: var(--text); }
.scenario-tab.active { border-color: var(--cyan); background: #39d2ff12; color: var(--cyan); }

/* ── Main content: one scenario, 3 methods side by side ── */
.scenario-label { text-align: center; margin:0.8rem 0 0.2rem; font-size:0.78rem; color:var(--text-muted); font-family:'JetBrains Mono',monospace; }

.methods-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.8rem; margin-bottom: 1rem; }
@media(max-width:850px) { .methods-row { grid-template-columns: 1fr; } }

.method-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1rem 0.8rem; text-align: center; position: relative; transition: 0.2s; }
.method-card.recommended { border-color: var(--green); border-width: 2px; }
.method-card.danger { border-color: var(--red); border-width: 1.5px; }
.method-card.neutral { }

.verdict-banner { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; padding: 0.25rem 0.8rem; border-radius: 100px; display: inline-block; margin-bottom: 0.5rem; letter-spacing: 0.04em; }
.verdict-banner.use { background: #3fb95018; color: var(--green); border: 1px solid var(--green); }
.verdict-banner.dont { background: #f8514918; color: var(--red); border: 1px solid var(--red); }
.verdict-banner.ok { background: #39d2ff10; color: var(--text-dim); border: 1px solid var(--border); }

.method-card h3 { font-family: 'Orbitron', sans-serif; font-size: 0.8rem; margin-bottom: 0.2rem; }
.method-card .why { font-size: 0.7rem; color: var(--text-dim); line-height: 1.5; margin: 0.6rem 0; min-height: 40px; }
.method-card .why strong { color: var(--cyan); }

.method-card canvas { display: block; margin: 0 auto; border-radius: 6px; background: var(--bg); width: 100%; height: auto; }

.leak-tag { display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 0.58rem; padding: 0.2em 0.5em; border-radius: 4px; margin-top: 0.3rem; }
.leak-tag.leaky { background: #f8514915; color: var(--red); border: 1px solid var(--red); }
.leak-tag.safe { background: #3fb95015; color: var(--green); border: 1px solid var(--green); }

/* ── Key takeaway ── */
.key-takeaway { background: var(--bg-card); border: 2px solid var(--green); border-radius: 12px; padding: 1rem 1.5rem; text-align: center; margin-top: 0.5rem; }
.key-takeaway .big-icon { font-size: 2rem; }
.key-takeaway h3 { font-family: 'Orbitron', sans-serif; font-size: 0.9rem; color: var(--green); margin: 0.3rem 0; }
.key-takeaway p { font-size: 0.85rem; color: var(--text-dim); line-height: 1.6; }

/* Dotted divider */
.vs-divider { display: flex; align-items: center; gap: 0.5rem; justify-content: center; margin: 0.3rem 0; font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--text-muted); }
.vs-divider span { flex:1; border-top: 1px dashed var(--border); }
</style>
</head>
<body>

<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">☀️</button>

<div class="app">
  <header class="header">
    <h1>Train / Test Split — Which Method When?</h1>
    <p>Pick your data type below. Green = USE THIS. Red = AVOID.</p>
  </header>

  <div class="scenario-tabs">
    <button class="scenario-tab active" onclick="switchScenario('houses')">🏠 House Prices</button>
    <button class="scenario-tab" onclick="switchScenario('stocks')">📈 Stock Prices</button>
    <button class="scenario-tab" onclick="switchScenario('users')">👤 User Churn</button>
  </div>

  <div id="mainContent"></div>
</div>

<script>
function toggleTheme() {
  document.body.classList.toggle('light');
  document.getElementById('themeToggle').textContent = document.body.classList.contains('light') ? '🌙' : '☀️';
  localStorage.setItem('split2-theme', document.body.classList.contains('light') ? 'light' : 'dark');
  setTimeout(drawCurrent, 50);
}
if (localStorage.getItem('split2-theme') === 'light') {
  document.body.classList.add('light'); document.getElementById('themeToggle').textContent = '🌙';
}

let scenario = 'houses';

function switchScenario(s) {
  scenario = s;
  document.querySelectorAll('.scenario-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderAll();
}

function renderAll() {
  const mc = document.getElementById('mainContent');
  if (scenario === 'houses') renderHouses(mc);
  else if (scenario === 'stocks') renderStocks(mc);
  else renderUsers(mc);
}

// ═══════════════════════════════════════════
// SCENARIO 1: HOUSE PRICES
// ═══════════════════════════════════════════
function renderHouses(mc) {
  mc.innerHTML = `
    <div class="scenario-label">📋 Data type: Each row = one house. Houses are INDEPENDENT of each other.</div>
    <div class="methods-row">
      <div class="method-card recommended">
        <span class="verdict-banner use">✅ USE THIS</span>
        <h3>🎲 Random Split</h3>
        <div class="why">Shuffle all houses randomly. 80% train, 20% test. <strong>House #123 cannot help predict House #456</strong> — they're independent.</div>
        <canvas id="cHousesRandom" width="280" height="170"></canvas>
        <span class="leak-tag safe">✅ No leakage possible</span>
      </div>
      <div class="method-card neutral">
        <span class="verdict-banner ok">⚠️ WORKS BUT OVERKILL</span>
        <h3>📅 Time-Based Split</h3>
        <div class="why">Train on 2006-2009 houses, test on 2010 houses. Works fine — but <strong>adds no value</strong> over random. Unnecessary complexity.</div>
        <canvas id="cHousesTime" width="280" height="170"></canvas>
        <span class="leak-tag safe">✅ Safe, just unnecessary</span>
      </div>
      <div class="method-card neutral">
        <span class="verdict-banner ok">⚠️ SAME AS RANDOM</span>
        <h3>👤 Entity-Based Split</h3>
        <div class="why">Each house IS its own entity. Splitting by "house ID" = random split. <strong>No user or entity connects houses together.</strong></div>
        <canvas id="cHousesEntity" width="280" height="170"></canvas>
        <span class="leak-tag safe">✅ Same as random here</span>
      </div>
    </div>
    <div class="key-takeaway">
      <div class="big-icon">🏠</div>
      <h3>House Prices → Use Random Split</h3>
      <p>Houses don't influence each other. Random shuffling is perfectly safe. <strong>This is what your Phase 5 project uses.</strong></p>
    </div>`;

  setTimeout(() => {
    drawHouses('cHousesRandom', true);
    drawHouses('cHousesTime', false);
    drawHouses('cHousesEntity', false);
  }, 30);
}

function drawHouses(canvasId, shuffled) {
  const c = document.getElementById(canvasId); if(!c) return;
  const W=280, H=170, ctx=c.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const split = Math.floor(W * 0.7);

  ctx.fillStyle = 'rgba(57,210,255,0.08)'; ctx.fillRect(0,0,split,H);
  ctx.fillStyle = 'rgba(255,179,71,0.08)'; ctx.fillRect(split,0,W-split,H);
  ctx.font = '8px "JetBrains Mono"'; ctx.fillStyle = 'rgba(57,210,255,0.4)'; ctx.fillText('TRAIN',6,14);
  ctx.fillStyle = 'rgba(255,179,71,0.4)'; ctx.fillText('TEST',split+6,14);

  const dots = [];
  for(let i=0;i<30;i++) dots.push({x:15+Math.random()*(W-30), y:30+Math.random()*(H-45), train:true});
  dots.forEach(d => { d.train = d.x < split; });

  dots.forEach(d => {
    ctx.beginPath(); ctx.arc(d.x, d.y, 5, 0, Math.PI*2);
    ctx.fillStyle = d.train ? 'rgba(57,210,255,0.8)' : 'rgba(255,179,71,0.8)';
    ctx.fill();
  });

  ctx.strokeStyle = 'rgba(139,148,158,0.5)'; ctx.lineWidth = 1.5; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(split,0); ctx.lineTo(split,H); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(139,148,158,0.4)'; ctx.font = 'bold 9px "JetBrains Mono"';
  ctx.fillText('← 80% →', W/2-28, H-5); ctx.fillText('← 20% →', W-35, H-5);
}

// ═══════════════════════════════════════════
// SCENARIO 2: STOCK PRICES
// ═══════════════════════════════════════════
function renderStocks(mc) {
  mc.innerHTML = `
    <div class="scenario-label">📋 Data type: Each row = one day. Rows are CONNECTED BY TIME. Yesterday influences today.</div>
    <div class="methods-row">
      <div class="method-card danger">
        <span class="verdict-banner dont">❌ DO NOT USE</span>
        <h3>🎲 Random Split</h3>
        <div class="why">Shuffling puts <strong>future days in training</strong> and past days in test. Model learns from tomorrow's price. <strong style="color:var(--red)">Test accuracy is fake.</strong></div>
        <canvas id="cStocksRandom" width="280" height="170"></canvas>
        <span class="leak-tag leaky">🔴 Future leaks into training</span>
      </div>
      <div class="method-card recommended">
        <span class="verdict-banner use">✅ USE THIS</span>
        <h3>📅 Time-Based Split</h3>
        <div class="why">Train on Jan–Sep, test on Oct–Dec. <strong>Model is tested on the future</strong> — exactly like real life. The only correct way.</div>
        <canvas id="cStocksTime" width="280" height="170"></canvas>
        <span class="leak-tag safe">✅ No leakage</span>
      </div>
      <div class="method-card neutral">
        <span class="verdict-banner ok">⚠️ DOESN'T APPLY</span>
        <h3>👤 Entity-Based Split</h3>
        <div class="why">Stocks don't have "users" or "entities." <strong>This method makes no sense for time-series data.</strong> Use time-based split instead.</div>
        <canvas id="cStocksEntity" width="280" height="170"></canvas>
        <span class="leak-tag safe">N/A for stocks</span>
      </div>
    </div>
    <div class="key-takeaway">
      <div class="big-icon">📈</div>
      <h3>Stock Prices → Use Time-Based Split</h3>
      <p>Time-series data MUST be split chronologically. <strong>Random shuffling time-series is the #1 beginner mistake in ML.</strong></p>
    </div>`;

  setTimeout(() => {
    drawStocks('cStocksRandom', true);
    drawStocks('cStocksTime', false);
    drawStocksEntityNA('cStocksEntity');
  }, 30);
}

function drawStocks(canvasId, shuffled) {
  const c = document.getElementById(canvasId); if(!c) return;
  const W=280, H=170, ctx=c.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const split = Math.floor(W * 0.7);

  ctx.fillStyle = 'rgba(57,210,255,0.08)'; ctx.fillRect(0,0,split,H);
  ctx.fillStyle = 'rgba(255,179,71,0.08)'; ctx.fillRect(split,0,W-split,H);
  ctx.font = '8px "JetBrains Mono"'; ctx.fillStyle = 'rgba(57,210,255,0.4)'; ctx.fillText('TRAIN',6,14);
  ctx.fillStyle = 'rgba(255,179,71,0.4)'; ctx.fillText('TEST',split+6,14);
  ctx.font = '7px "JetBrains Mono"'; ctx.fillStyle = 'rgba(139,148,158,0.25)';
  ctx.fillText('Jan',20,14); ctx.fillText('Jun',110,14); ctx.fillText('Dec',245,14);

  const dots = [];
  for(let i=0;i<35;i++) {
    const x = 20 + (i/34)*(W-40);
    const y = 130 - (i/34)*80 + Math.sin(i*0.4)*15 + (Math.random()-0.5)*8;
    dots.push({x, y, timeIdx:i});
  }

  ctx.strokeStyle = 'rgba(139,148,158,0.2)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(dots[0].x,dots[0].y);
  for(let i=1;i<dots.length;i++) ctx.lineTo(dots[i].x,dots[i].y);
  ctx.stroke();

  dots.forEach(d => {
    ctx.beginPath(); ctx.arc(d.x, d.y, 4, 0, Math.PI*2);
    if(shuffled && d.timeIdx > 24) { ctx.fillStyle = 'rgba(248,81,73,0.9)'; }
    else if(shuffled && d.timeIdx < 10 && d.x > split) { ctx.fillStyle = 'rgba(248,81,73,0.5)'; }
    else { ctx.fillStyle = d.x < split ? 'rgba(57,210,255,0.8)' : 'rgba(255,179,71,0.8)'; }
    ctx.fill();
  });

  if(shuffled) {
    ctx.font = 'bold 8px "JetBrains Mono"'; ctx.fillStyle = 'rgba(248,81,73,0.9)';
    const leak = dots.find(d=>d.timeIdx>24&&d.x<split);
    if(leak) { ctx.fillText('FUTURE', leak.x-25, leak.y-8); ctx.fillText('LEAKED!', leak.x-25, leak.y+6); }
  }

  ctx.strokeStyle = 'rgba(139,148,158,0.5)'; ctx.lineWidth = 1.5; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(split,0); ctx.lineTo(split,H); ctx.stroke();
  ctx.setLineDash([]);
}

function drawStocksEntityNA(canvasId) {
  const c = document.getElementById(canvasId); if(!c) return;
  const W=280, H=170, ctx=c.getContext('2d');
  ctx.clearRect(0,0,W,H);
  ctx.font = '11px "DM Sans"'; ctx.fillStyle = 'rgba(139,148,158,0.4)';
  ctx.fillText('Stocks have no entities.', 40, 70);
  ctx.fillText('Use time-based split instead.', 22, 95);
}

// ═══════════════════════════════════════════
// SCENARIO 3: USER CHURN
// ═══════════════════════════════════════════
function renderUsers(mc) {
  mc.innerHTML = `
    <div class="scenario-label">📋 Data type: Each row = one user action. Multiple rows per user. Users are CONNECTED.</div>
    <div class="methods-row">
      <div class="method-card danger">
        <span class="verdict-banner dont">❌ DO NOT USE</span>
        <h3>🎲 Random Split</h3>
        <div class="why"><strong style="color:var(--red)">Same user appears in BOTH train and test.</strong> Model memorizes "User A always churns" — fake accuracy. Fails on new users.</div>
        <canvas id="cUsersRandom" width="280" height="170"></canvas>
        <span class="leak-tag leaky">🔴 Same users in both sides</span>
      </div>
      <div class="method-card danger">
        <span class="verdict-banner dont">❌ DO NOT USE</span>
        <h3>📅 Time-Based Split</h3>
        <div class="why">Split by time, but <strong style="color:var(--red)">users still appear in both sides.</strong> User A's Jan data in train, June data in test — still leaked.</div>
        <canvas id="cUsersTime" width="280" height="170"></canvas>
        <span class="leak-tag leaky">🔴 Still leaks users</span>
      </div>
      <div class="method-card recommended">
        <span class="verdict-banner use">✅ USE THIS</span>
        <h3>👤 Entity-Based Split</h3>
        <div class="why"><strong style="color:var(--green)">Entire users stay together.</strong> Users A,B,C in training. Users D,E in test. Model tested on people it has NEVER seen.</div>
        <canvas id="cUsersEntity" width="280" height="170"></canvas>
        <span class="leak-tag safe">✅ No user appears in both</span>
      </div>
    </div>
    <div class="key-takeaway">
      <div class="big-icon">👤</div>
      <h3>User Churn → Use Entity-Based Split</h3>
      <p>When multiple rows belong to the same person, <strong>keep that person's data together.</strong> Testing on users the model already knows is cheating.</p>
    </div>`;

  setTimeout(() => {
    drawUsers('cUsersRandom', 'random');
    drawUsers('cUsersTime', 'time');
    drawUsersEntity('cUsersEntity');
  }, 30);
}

function drawUsers(canvasId, mode) {
  const c = document.getElementById(canvasId); if(!c) return;
  const W=280, H=170, ctx=c.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const split = Math.floor(W * 0.7);

  ctx.fillStyle = 'rgba(57,210,255,0.08)'; ctx.fillRect(0,0,split,H);
  ctx.fillStyle = 'rgba(255,179,71,0.08)'; ctx.fillRect(split,0,W-split,H);
  ctx.font = '8px "JetBrains Mono"'; ctx.fillStyle = 'rgba(57,210,255,0.4)'; ctx.fillText('TRAIN',6,14);
  ctx.fillStyle = 'rgba(255,179,71,0.4)'; ctx.fillText('TEST',split+6,14);

  const users = [
    { color: 'rgba(57,210,255,0.85)', yBase: 0.22, pts:[] },
    { color: 'rgba(255,179,71,0.85)', yBase: 0.45, pts:[] },
    { color: 'rgba(191,57,137,0.85)', yBase: 0.68, pts:[] },
  ];

  users.forEach((u,ui) => {
    for(let i=0;i<12;i++) {
      const x = 25 + (i/11)*(W-50);
      const y = (ui+1)*(H/4.5) + Math.sin(i*0.7)*15 + (Math.random()-0.5)*6;
      u.pts.push({x, y, userIdx:ui});
    }
  });

  // Lines connecting each user's points
  users.forEach(u => {
    ctx.strokeStyle = u.color.replace('0.85','0.2'); ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(u.pts[0].x,u.pts[0].y);
    for(let i=1;i<u.pts.length;i++) ctx.lineTo(u.pts[i].x,u.pts[i].y);
    ctx.stroke();
  });

  // Detect if each user is split
  users.forEach(u => {
    const inTrain = u.pts.some(p => p.x < split);
    const inTest = u.pts.some(p => p.x >= split);
    const isLeaked = inTrain && inTest;

    u.pts.forEach(p => {
      ctx.beginPath(); ctx.arc(p.x,p.y,4.5,0,Math.PI*2);
      if(isLeaked){ ctx.fillStyle='rgba(248,81,73,0.85)'; }
      else { ctx.fillStyle = p.x < split ? u.color : u.color.replace('0.85','0.6'); }
      ctx.fill();
    });
  });

  // Labels
  users.forEach((u,i) => {
    ctx.font = 'bold 8px "JetBrains Mono"';
    ctx.fillStyle = u.color;
    ctx.fillText(['A','B','C'][i], W-18, u.pts[0].y+4);
  });

  // Leakage warning
  const anyLeaked = users.some(u => u.pts.some(p=>p.x<split) && u.pts.some(p=>p.x>=split));
  if(anyLeaked) {
    ctx.font = 'bold 8px "JetBrains Mono"'; ctx.fillStyle = 'rgba(248,81,73,0.9)';
    ctx.fillText('⚠ USERS SPLIT', 30, H-15);
    ctx.fillText('ACROSS BOTH SIDES', 30, H-3);
  }

  ctx.strokeStyle = 'rgba(139,148,158,0.5)'; ctx.lineWidth = 1.5; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(split,0); ctx.lineTo(split,H); ctx.stroke();
  ctx.setLineDash([]);
}

function drawUsersEntity(canvasId) {
  const c = document.getElementById(canvasId); if(!c) return;
  const W=280, H=170, ctx=c.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const split = Math.floor(W * 0.58);

  ctx.fillStyle = 'rgba(57,210,255,0.08)'; ctx.fillRect(0,0,split,H);
  ctx.fillStyle = 'rgba(255,179,71,0.08)'; ctx.fillRect(split,0,W-split,H);
  ctx.font = '8px "JetBrains Mono"'; ctx.fillStyle = 'rgba(57,210,255,0.4)'; ctx.fillText('TRAIN (Users A,B)',6,14);
  ctx.fillStyle = 'rgba(255,179,71,0.4)'; ctx.fillText('TEST (User C)',split+6,14);

  const users = [
    { color: 'rgba(57,210,255,0.85)', train: true,  yBase: 0.25 },
    { color: 'rgba(255,179,71,0.85)', train: true,  yBase: 0.55 },
    { color: 'rgba(191,57,137,0.85)', train: false, yBase: 0.78 },
  ];

  users.forEach(u => {
    const pts = [];
    const xRange = u.train ? { min: 15, max: split-10 } : { min: split+10, max: W-15 };
    for(let i=0;i<12;i++) {
      const x = xRange.min + (i/11)*(xRange.max - xRange.min);
      const y = u.yBase*H + Math.sin(i*0.7)*12 + (Math.random()-0.5)*5;
      pts.push({x,y});
    }

    ctx.strokeStyle = u.color.replace('0.85','0.2'); ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
    ctx.stroke();

    pts.forEach(p => { ctx.beginPath(); ctx.arc(p.x,p.y,4.5,0,Math.PI*2); ctx.fillStyle=u.color; ctx.fill(); });

    ctx.font = 'bold 8px "JetBrains Mono"';
    ctx.fillStyle = u.color;
    ctx.fillText(['User A','User B','User C'][u.train?0:u.train===false?2:1], u.train ? split-55 : W-55, pts[0].y+4);
  });

  ctx.strokeStyle = 'rgba(165,113,247,0.5)'; ctx.lineWidth = 1.5; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(split,0); ctx.lineTo(split,H); ctx.stroke();
  ctx.setLineDash([]);

  ctx.font = 'bold 10px "JetBrains Mono"'; ctx.fillStyle = 'rgba(63,185,80,0.9)';
  ctx.fillText('✅ NO USER LEAKED', 70, H-10);
}

// ── Init ──
renderAll();
</script>
