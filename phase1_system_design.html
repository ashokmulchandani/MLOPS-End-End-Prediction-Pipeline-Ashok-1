<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phase 1: ML System Design Thinking — Interactive Learning</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06090f;
  --bg-card: #0d1117;
  --bg-raised: #161b22;
  --border: #21262d;
  --border-active: #30363d;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --text-muted: #484f58;
  --cyan: #39d2ff;
  --cyan-bg: #39d2ff15;
  --cyan-border: #39d2ff40;
  --amber: #ffb347;
  --amber-bg: #ffb34715;
  --green: #3fb950;
  --green-bg: #3fb95015;
  --magenta: #ff6ec7;
  --magenta-bg: #ff6ec715;
  --red: #f85149;
  --violet: #a371f7;
  --radius: 14px;
  --radius-sm: 8px;
  --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
}

/* Light theme */
body.light {
  --bg: #f6f8fa;
  --bg-card: #ffffff;
  --bg-raised: #e8ecf0;
  --border: #d0d7de;
  --border-active: #afb8c1;
  --text: #1f2328;
  --text-dim: #656d76;
  --text-muted: #8b949e;
  --cyan: #0969da;
  --cyan-bg: #ddf4ff;
  --cyan-border: #54aeff;
  --amber: #9a6700;
  --amber-bg: #fff8c5;
  --green: #1a7f37;
  --green-bg: #dafbe1;
  --magenta: #bf3989;
  --magenta-bg: #fbefff;
  --red: #cf222e;
  --violet: #8250df;
}
body.light .topbar { background: rgba(246,248,250,0.9); }
body.light .eq-box { background: rgba(0,0,0,0.03); }

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  line-height: 1.65;
  transition: background 0.3s, color 0.3s;
}

.bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }

.app { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:2rem; }

/* ── Theme Toggle ── */
.theme-toggle {
  position: fixed; top: 0.7rem; right: 2rem; z-index: 200;
  background: var(--bg-raised); border: 1px solid var(--border);
  color: var(--text); font-size: 1.1rem; cursor: pointer;
  padding: 0.35rem 0.6rem; border-radius: 6px;
  transition: var(--transition);
  font-family: 'JetBrains Mono', monospace;
}
.theme-toggle:hover { border-color: var(--cyan); color: var(--cyan); }

/* ── Top Bar ── */
.topbar {
  position: sticky; top:0; z-index:100;
  background: rgba(6,9,15,0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0.6rem 2rem;
  display: flex; align-items: center; gap: 1rem;
  font-size: 0.8rem;
}
.topbar .logo {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.7rem; letter-spacing: 0.15em;
  color: var(--cyan);
  white-space: nowrap;
}
.topbar .step-dots {
  display: flex; gap: 0.4rem; flex:1; justify-content: center;
}
.topbar .step-dot {
  width: 28px; height: 4px; border-radius: 2px;
  background: var(--border);
  transition: var(--transition);
  cursor: pointer;
}
.topbar .step-dot.done { background: var(--green); }
.topbar .step-dot.active { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }
.topbar .step-dot:hover { background: var(--text-dim); }
.topbar .step-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem; color: var(--text-dim);
  white-space: nowrap;
}

/* ── Header ── */
.header {
  text-align: center;
  padding: 3rem 0 1rem;
}
.header .phase-badge {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem; letter-spacing: 0.2em;
  color: var(--green); border: 1px solid var(--green-bg);
  border-radius: 100px; padding: 0.4em 1.4em;
  margin-bottom: 1rem;
}
.header h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(1.6rem, 4vw, 2.6rem);
  font-weight: 700;
  background: linear-gradient(135deg, var(--cyan), var(--violet));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0.5rem;
}
.header .tagline {
  color: var(--text-dim); font-size: 1rem;
}

/* ── Topic Chips ── */
.topic-list {
  display: flex; flex-wrap: wrap; gap: 0.4rem;
  justify-content: center; margin: 1.5rem 0 1rem;
}
.topic-chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem; letter-spacing: 0.04em;
  padding: 0.3rem 0.7rem; border-radius: 100px;
  border: 1px solid var(--border);
  color: var(--text-muted); cursor: pointer;
  transition: var(--transition);
  background: transparent;
}
.topic-chip.visited { border-color: var(--green-border, var(--green)); color: var(--green); background: var(--green-bg); }
.topic-chip.current { border-color: var(--cyan); color: var(--cyan); background: var(--cyan-bg); box-shadow: 0 0 10px var(--cyan-border); }
.topic-chip:hover { border-color: var(--text-dim); color: var(--text-dim); }

/* ── Fun Fact ── */
.fun-fact {
  background: linear-gradient(135deg, var(--amber-bg), var(--magenta-bg));
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 0.65rem 1.2rem; margin-bottom: 1.5rem;
  font-size: 0.78rem; color: var(--text-dim);
  display: flex; align-items: center; gap: 0.6rem;
}
.fun-fact .bulb { font-size: 1.2rem; flex-shrink: 0; }
.fun-fact strong { color: var(--amber); }

/* ── Slide ── */
.slide { animation: slideIn 0.35s ease; }
@keyframes slideIn {
  from { opacity: 0; transform: translateX(40px); }
  to { opacity: 1; transform: translateX(0); }
}
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 2rem;
}
.card h2 {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.1rem; font-weight: 600;
  margin-bottom: 0.5rem;
  display: flex; align-items: center; gap: 0.5rem;
  color: var(--text);
}
.card h2 .num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem; color: var(--cyan);
  background: var(--cyan-bg); border-radius: 6px;
  padding: 0.2em 0.6em;
}
.card p { color: var(--text-dim); margin-bottom: 1rem; font-size: 0.95rem; }
.card h3 {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.85rem; color: var(--cyan);
  margin: 1.2rem 0 0.5rem;
}
.card ul, .card ol {
  color: var(--text-dim); padding-left: 1.5rem;
  margin-bottom: 1rem; font-size: 0.9rem;
}
.card ul li, .card ol li { margin-bottom: 0.4rem; }

/* ── Eq Box (Code) ── */
.eq-box {
  background: rgba(0,0,0,0.4);
  border-left: 3px solid var(--cyan);
  border-radius: var(--radius-sm);
  padding: 1.2rem 1.5rem; margin: 1rem 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem; line-height: 1.8;
  color: var(--text); white-space: pre-wrap;
  overflow-x: auto;
}

/* ── Compare Grid ── */
.compare-grid {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;
  margin: 1rem 0;
}
.compare-grid.two-col { grid-template-columns: 1fr 1fr; }
.compare-card {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 1.2rem;
  transition: var(--transition);
}
.compare-card:hover { transform: translateY(-3px); border-color: var(--border-active); }
.compare-card.pick-a { border-left: 3px solid var(--red); }
.compare-card.pick-b { border-left: 3px solid var(--cyan); }
.compare-card.pick-c { border-left: 3px solid var(--green); }
.compare-card h4 {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.78rem; margin-bottom: 0.5rem;
}
.compare-card.pick-a h4 { color: var(--red); }
.compare-card.pick-b h4 { color: var(--cyan); }
.compare-card.pick-c h4 { color: var(--green); }
.compare-card p { font-size: 0.82rem !important; color: var(--text-dim) !important; }
.compare-card .tag-row {
  display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.5rem;
}
.compare-card .tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem; padding: 0.2em 0.6em;
  border-radius: 100px;
}
.tag.low { background: var(--green-bg); color: var(--green); border: 1px solid var(--green); }
.tag.med { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber); }
.tag.high { background: #f8514920; color: var(--red); border: 1px solid var(--red); }

/* ── Pipeline / Ladder ── */
.pipeline {
  display: flex; align-items: center; gap: 0.6rem;
  justify-content: center; flex-wrap: wrap;
  margin: 1.2rem 0;
}
.pipeline-stage {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0.8rem 1rem; text-align: center;
  transition: var(--transition);
  min-width: 120px;
}
.pipeline-stage.highlight { border-color: var(--cyan); background: var(--cyan-bg); }
.pipeline-stage .stage-icon { font-size: 1.5rem; margin-bottom: 0.3rem; }
.pipeline-stage .stage-name {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.65rem; color: var(--cyan);
  line-height: 1.3;
}
.pipeline-stage .stage-desc {
  font-size: 0.72rem; color: var(--text-muted);
  margin-top: 0.2rem;
}
.pipeline-arrow {
  font-size: 1.4rem; color: var(--cyan);
  animation: arrowPulse 1.5s ease-in-out infinite;
}
@keyframes arrowPulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

/* Ladder variant (vertical steps) */
.ladder {
  display: flex; flex-direction: column; gap: 0.5rem;
  margin: 1rem 0;
}
.ladder-rung {
  display: flex; align-items: center; gap: 0.8rem;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0.7rem 1rem;
  transition: var(--transition);
}
.ladder-rung:hover { border-color: var(--cyan); }
.ladder-rung .rung-icon { font-size: 1.3rem; flex-shrink: 0; }
.ladder-rung .rung-bar {
  width: 6px; height: 36px; border-radius: 3px; flex-shrink: 0;
}
.ladder-rung .rung-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem; color: var(--text);
  min-width: 90px;
}
.ladder-rung .rung-metric {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.72rem; color: var(--cyan);
  flex: 1;
}
.ladder-rung .rung-example {
  font-size: 0.72rem; color: var(--text-muted);
}

/* ── Data Type Cards ── */
.data-types {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.8rem;
  margin: 1rem 0;
}
.data-types.two { grid-template-columns: repeat(2, 1fr); }
.data-type-card {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-top: 3px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 1rem;
  transition: var(--transition);
  cursor: default;
}
.data-type-card:nth-child(1) { border-top-color: var(--cyan); }
.data-type-card:nth-child(2) { border-top-color: var(--amber); }
.data-type-card:nth-child(3) { border-top-color: var(--magenta); }
.data-type-card:nth-child(4) { border-top-color: var(--green); }
.data-type-card:nth-child(5) { border-top-color: var(--violet); }
.data-type-card:hover { transform: translateY(-3px); border-color: var(--border-active); }
.data-type-card .dt-icon { font-size: 1.5rem; margin-bottom: 0.3rem; }
.data-type-card h4 {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.78rem; margin-bottom: 0.3rem;
}
.data-type-card :nth-child(2) { color: var(--cyan); }
.data-type-card p { font-size: 0.78rem !important; color: var(--text-muted) !important; margin-bottom: 0 !important; }

/* ── Flashcard ── */
.flashcard-wrap {
  perspective: 800px; margin: 1rem 0;
  cursor: pointer;
}
.flashcard {
  position: relative;
  width: 100%; min-height: 90px;
  transform-style: preserve-3d;
  transition: transform 0.5s;
}
.flashcard.flipped { transform: rotateY(180deg); }
.flashcard .front, .flashcard .back {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  border-radius: var(--radius-sm);
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  padding: 1rem;
}
.flashcard .front {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  font-family: 'Orbitron', sans-serif;
  font-size: 0.85rem;
  color: var(--cyan);
}
.flashcard .front .hint {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.7rem; color: var(--text-muted);
  margin-top: 0.4rem;
}
.flashcard .back {
  background: var(--bg-raised);
  border: 1px solid var(--cyan);
  transform: rotateY(180deg);
  color: var(--text-dim);
  font-size: 0.85rem; text-align: center;
}

/* ── Quiz ── */
.quiz {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 1.2rem; margin-top: 1.5rem;
}
.quiz .question {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.82rem; color: var(--text);
  margin-bottom: 0.8rem;
}
.quiz .options { display: flex; flex-direction: column; gap: 0.4rem; }
.quiz .option {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.6rem 1rem;
  font-size: 0.82rem; color: var(--text-dim);
  cursor: pointer;
  transition: var(--transition);
}
.quiz .option:hover { border-color: var(--cyan); color: var(--cyan); }
.quiz .option.correct { border-color: var(--green); background: var(--green-bg); color: var(--green); }
.quiz .option.wrong { border-color: var(--red); background: #f8514920; color: var(--red); }
.quiz .feedback {
  display: none;
  margin-top: 0.8rem; padding: 0.6rem 1rem;
  border-radius: 6px; font-size: 0.82rem;
}
.quiz .feedback.show { display: block; }
.quiz .feedback.correct { background: var(--green-bg); color: var(--green); border: 1px solid var(--green); }
.quiz .feedback.wrong { background: #f8514920; color: var(--red); border: 1px solid var(--red); }

/* ── Step Flow ── */
.step-flow {
  display: flex; align-items: center; gap: 0.5rem;
  justify-content: center; flex-wrap: wrap;
  margin: 1.2rem 0;
}
.flow-step {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0.6rem 0.8rem; text-align: center;
  font-size: 0.72rem; color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
  transition: var(--transition);
}
.flow-step.alert { border-color: var(--red); color: var(--red); }
.flow-step.action { border-color: var(--green); color: var(--green); }
.flow-arrow { color: var(--text-muted); font-size: 1rem; }

/* ── Nav Row ── */
.nav-row {
  display: flex; gap: 1rem; justify-content: center;
  margin-top: 1.5rem;
}
.nav-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem; padding: 0.6rem 1.8rem;
  border-radius: 100px; border: 1px solid var(--border);
  background: transparent; color: var(--text-dim);
  cursor: pointer; transition: var(--transition);
}
.nav-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.nav-btn.primary {
  border-color: var(--cyan); color: var(--cyan);
  background: var(--cyan-bg);
}

/* ── Checklist ── */
.checklist { margin: 1rem 0; }
.checklist .check-item {
  display: flex; align-items: center; gap: 0.6rem;
  padding: 0.5rem 0.8rem;
  border-bottom: 1px solid var(--border);
  font-size: 0.85rem; color: var(--text-dim);
}
.checklist .check-box {
  font-size: 1rem; flex-shrink: 0;
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .app { padding: 1rem; }
  .topbar { padding: 0.5rem 1rem; }
  .compare-grid { grid-template-columns: 1fr; }
  .data-types { grid-template-columns: 1fr; }
  .pipeline { flex-direction: column; }
  .pipeline-arrow { transform: rotate(90deg); }
  .header h1 { font-size: 1.3rem; }
  .card { padding: 1.2rem; }
  .theme-toggle { right: 0.5rem; top: 0.5rem; font-size: 0.9rem; padding: 0.3rem 0.5rem; }
}
</style>
</head>
<body>

<canvas class="bg-canvas" id="bgCanvas"></canvas>

<button class="theme-toggle" id="themeToggle" title="Toggle light/dark theme" onclick="toggleTheme()">☀️</button>

<nav class="topbar">
  <span class="logo">MLOPS — PHASE 1</span>
  <div class="step-dots" id="stepDots"></div>
  <span class="step-label" id="stepLabel">1/10</span>
</nav>

<div class="app">
  <header class="header">
    <div class="phase-badge">📖 IN PROGRESS</div>
    <h1>Phase 1: ML System Design Thinking</h1>
    <p class="tagline">Think before you build — the 10-step framework that separates production ML from toy projects</p>
  </header>

  <div class="topic-list" id="topicChips"></div>

  <div class="fun-fact" id="funFact">
    <span class="bulb">💡</span>
    <span class="fact-text" id="funFactText"></span>
  </div>

  <div id="slideContainer"></div>

  <div class="nav-row">
    <button class="nav-btn" id="prevBtn" onclick="goTo(currentSlide-1)">← Previous</button>
    <button class="nav-btn primary" id="nextBtn" onclick="goTo(currentSlide+1)">Next →</button>
  </div>
</div>

<script>
// ── Theme Toggle ──
function toggleTheme() {
  document.body.classList.toggle('light');
  const btn = document.getElementById('themeToggle');
  btn.textContent = document.body.classList.contains('light') ? '🌙' : '☀️';
  localStorage.setItem('mlops-phase1-theme', document.body.classList.contains('light') ? 'light' : 'dark');
}
(function() {
  if (localStorage.getItem('mlops-phase1-theme') === 'light') {
    document.body.classList.add('light');
    document.getElementById('themeToggle').textContent = '🌙';
  }
})();

// ── Background Particles ──
(function() {
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize(); window.addEventListener('resize', resize);

  for (let i = 0; i < 60; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4,
      r: Math.random() * 2 + 0.5,
      a: Math.random() * 0.3 + 0.1,
    });
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const isLight = document.body.classList.contains('light');
    const lineColor = isLight ? 'rgba(9,105,218,0.06)' : 'rgba(57,210,255,0.06)';
    const dotColor = isLight ? 'rgba(9,105,218,0.3)' : 'rgba(57,210,255,0.3)';

    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = canvas.width;
      if (p.x > canvas.width) p.x = 0;
      if (p.y < 0) p.y = canvas.height;
      if (p.y > canvas.height) p.y = 0;
    });

    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 100) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = lineColor;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }

    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = dotColor;
      ctx.fill();
    });

    requestAnimationFrame(animate);
  }
  animate();
})();

// ── Slide Data ──
const slides = [
  // ═══════ SLIDE 1: Does This Problem Even Need ML? ═══════
  {
    id: '1.1',
    title: 'Does This Problem Even Need ML?',
    fact: '<strong>Most ML projects fail at the definition stage</strong>, not the modeling stage. The 6-word test saves you months of wasted effort.',
    render() { return `
<div class="slide">

// ── Quiz Logic ──
window.checkQuiz = function(quizId, clickedEl) {
  const quiz = document.getElementById(quizId);
  if (quiz.dataset.answered === 'true') return;

  const options = quiz.querySelectorAll('.option');
  const feedback = document.getElementById(quizId + '-fb');
  const isCorrect = clickedEl.dataset.correct === 'true';

  options.forEach(o => {
    if (o.dataset.correct === 'true') o.classList.add('correct');
  });
  if (!isCorrect) clickedEl.classList.add('wrong');

  feedback.className = 'feedback show ' + (isCorrect ? 'correct' : 'wrong');
  feedback.textContent = isCorrect
    ? '✅ Correct! Well done.'
    : '❌ Not quite. The correct answer is highlighted in green.';
  quiz.dataset.answered = 'true';
};

// ── Navigation State ──
let currentSlide = 0;
const visitedSlides = new Set([0]);

function renderSlide(index) {
  currentSlide = index;
  visitedSlides.add(index);
  document.getElementById('slideContainer').innerHTML = slides[index].render();
  updateDots();
  updateChips();
  document.getElementById('funFactText').innerHTML = '<strong>' + slides[index].id + ':</strong> ' + slides[index].fact;
  document.getElementById('stepLabel').textContent = (index + 1) + '/' + slides.length;
  document.getElementById('prevBtn').disabled = index === 0;
  const nextBtn = document.getElementById('nextBtn');
  if (index === slides.length - 1) {
    nextBtn.textContent = '✓ Complete';
    nextBtn.style.background = 'var(--green-bg)';
    nextBtn.style.borderColor = 'var(--green)';
    nextBtn.style.color = 'var(--green)';
  } else {
    nextBtn.textContent = 'Next →';
    nextBtn.style.background = 'var(--cyan-bg)';
    nextBtn.style.borderColor = 'var(--cyan)';
    nextBtn.style.color = 'var(--cyan)';
  }
  document.getElementById('slideContainer').scrollIntoView({behavior:'smooth', block:'start'});
}

function goTo(index) {
  if (index < 0 || index >= slides.length) return;
  renderSlide(index);
}

function updateDots() {
  document.getElementById('stepDots').innerHTML = slides.map(function(s, i) {
    var cls = i === currentSlide ? 'active' : visitedSlides.has(i) ? 'done' : '';
    return '<div class="step-dot ' + cls + '" onclick="goTo(' + i + ')" title="' + s.id + ': ' + s.title + '"></div>';
  }).join('');
}

function updateChips() {
  document.getElementById('topicChips').innerHTML = slides.map(function(s, i) {
    var cls = i === currentSlide ? 'current' : visitedSlides.has(i) ? 'visited' : '';
    return '<span class="topic-chip ' + cls + '" onclick="goTo(' + i + ')">' + s.id + ' ' + s.title + '</span>';
  }).join('');
}

// ── Keyboard Navigation ──
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' && currentSlide < slides.length - 1) goTo(currentSlide + 1);
  if (e.key === 'ArrowLeft' && currentSlide > 0) goTo(currentSlide - 1);
});

// ── Init ──
renderSlide(0);
</script>
