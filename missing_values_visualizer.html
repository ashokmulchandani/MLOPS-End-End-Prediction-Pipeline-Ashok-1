<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Missing Values — Interactive Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06090f; --bg-card: #0d1117; --bg-raised: #161b22;
  --border: #21262d; --text: #e6edf3; --text-dim: #8b949e; --text-muted: #484f58;
  --cyan: #39d2ff; --amber: #ffb347; --green: #3fb950; --red: #f85149;
  --violet: #a371f7; --magenta: #ff6ec7;
}
body.light {
  --bg: #f6f8fa; --bg-card: #fff; --bg-raised: #e8ecf0;
  --border: #d0d7de; --text: #1f2328; --text-dim: #656d76; --text-muted: #8b949e;
  --cyan: #0969da; --amber: #9a6700; --green: #1a7f37; --red: #cf222e;
  --violet: #8250df; --magenta: #bf3989;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.3s, color 0.3s; }
.theme-toggle { position: fixed; top: 1rem; right: 1.5rem; z-index: 999; background: var(--bg-raised); border: 1px solid var(--border); color: var(--text); font-size: 1.2rem; cursor: pointer; padding: 0.4rem 0.7rem; border-radius: 8px; font-family: 'JetBrains Mono', monospace; }
.theme-toggle:hover { border-color: var(--cyan); color: var(--cyan); }
.app { max-width: 950px; margin: 0 auto; padding: 1.5rem; }
.header { text-align: center; padding: 1.5rem 0 0.5rem; }
.header h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(1.2rem, 3vw, 1.7rem); background: linear-gradient(135deg, var(--cyan), var(--violet)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.3rem; }
.header .subtitle { color: var(--text-dim); font-size: 0.9rem; }

/* ── Scenario Cards ── */
.scenario-row { display: flex; gap: 0.5rem; justify-content: center; margin: 1rem 0; flex-wrap: wrap; }
.scenario-card { background: var(--bg-card); border: 2px solid var(--border); border-radius: 12px; padding: 0.8rem 1rem; cursor: pointer; transition: 0.2s; text-align: center; min-width: 100px; }
.scenario-card:hover { transform: translateY(-2px); }
.scenario-card.active { border-color: var(--cyan); box-shadow: 0 0 15px #39d2ff15; }
.scenario-card .sc-icon { font-size: 1.8rem; display: block; }
.scenario-card .sc-name { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text); margin: 0.3rem 0 0.1rem; }
.scenario-card .sc-null { font-size: 0.8rem; font-weight: 700; }
.scenario-card .sc-tag { font-family: 'JetBrains Mono', monospace; font-size: 0.55rem; padding: 0.1em 0.5em; border-radius: 100px; margin-top: 0.2rem; display: inline-block; }

/* ── WHY Section ── */
.why-box { background: var(--bg-card); border: 1px solid var(--border); border-left: 4px solid var(--amber); border-radius: 10px; padding: 1rem 1.3rem; margin: 0.8rem 0; }
.why-box h3 { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; color: var(--amber); margin-bottom: 0.3rem; }
.why-box p { font-size: 0.9rem; color: var(--text-dim); line-height: 1.6; }
.why-box p strong { color: var(--cyan); }

/* ── Strategy Buttons ── */
.strat-row { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin: 0.8rem 0; }
.strat-btn { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; font-weight: 600; padding: 0.55rem 1rem; border-radius: 100px; border: 2px solid var(--border); background: var(--bg-card); color: var(--text-dim); cursor: pointer; transition: 0.2s; }
.strat-btn:hover { border-color: var(--cyan); color: var(--text); transform: translateY(-1px); }
.strat-btn.active { color: #fff !important; }
.strat-btn.btn-drop { border-color: var(--red); color: var(--red); }
.strat-btn.btn-drop.active { background: #f85149; color: #fff !important; border-color: #f85149; }
.strat-btn.btn-fill { border-color: var(--cyan); color: var(--cyan); }
.strat-btn.btn-fill.active { background: #39d2ff; color: #000 !important; border-color: #39d2ff; }
.strat-btn.btn-const { border-color: var(--green); color: var(--green); }
.strat-btn.btn-const.active { background: #3fb950; color: #000 !important; border-color: #3fb950; }
.strat-btn.btn-delete { border-color: var(--magenta); color: var(--magenta); }
.strat-btn.btn-delete.active { background: #ff6ec7; color: #000 !important; border-color: #ff6ec7; }

/* ── Before / After ── */
.compare-area { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 0.8rem 0; }
@media(max-width:750px){ .compare-area { grid-template-columns: 1fr; } }
.panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem; }
.panel h3 { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; margin-bottom: 0.6rem; display: flex; align-items: center; gap: 0.5rem; }
.panel h3 .pbadge { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; padding: 0.2em 0.6em; border-radius: 100px; font-weight: 600; }
.pbadge-before { background: #f8514920; color: var(--red); border: 1px solid var(--red); }
.pbadge-after { background: #3fb95020; color: var(--green); border: 1px solid var(--green); }
.panel canvas { display: block; margin: 0 auto; border-radius: 8px; }

/* ── Verdict ── */
.verdict-box { background: var(--bg-card); border: 2px solid var(--green); border-radius: 12px; padding: 1rem 1.3rem; margin-top: 0.8rem; }
.verdict-box h3 { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; color: var(--green); margin-bottom: 0.3rem; }
.verdict-box .rule { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--amber); margin-top: 0.3rem; }
.verdict-box p { font-size: 0.9rem; color: var(--text-dim); line-height: 1.6; }

/* ── Insight ── */
.insight-text { background: var(--bg-raised); border: 1px solid var(--border); border-radius: 8px; padding: 0.8rem 1rem; font-size: 0.85rem; color: var(--text-dim); line-height: 1.6; }
.insight-text .g { color: var(--green); }
.insight-text .r { color: var(--red); }
.insight-text .a { color: var(--amber); }
</style>
</head>
<body>

<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">☀️</button>

<div class="app">
  <header class="header">
    <h1>Missing Values — WHY Before HOW</h1>
    <p class="subtitle">Missing data tells a story. Understand WHY it's missing before you decide HOW to fix it.</p>
  </header>

  <!-- Scenario cards -->
  <div class="scenario-row" id="scenarioRow"></div>

  <!-- WHY box -->
  <div class="why-box" id="whyBox"></div>

  <!-- Strategy buttons -->
  <div class="strat-row" id="stratRow"></div>

  <!-- Before / After -->
  <div class="compare-area">
    <div class="panel"><h3>📊 Original Data <span class="pbadge pbadge-before">WITH NULLS</span></h3><canvas id="canvasBefore" width="420" height="300"></canvas></div>
    <div class="panel"><h3>✅ After: <span id="stratLabel">Fill Median</span> <span class="pbadge pbadge-after">FIXED</span></h3><canvas id="canvasAfter" width="420" height="300"></canvas><div class="insight-text" id="insight" style="margin-top:0.5rem"></div></div>
  </div>

  <!-- Verdict -->
  <div class="verdict-box" id="verdict"></div>
</div>

<script>
function toggleTheme() {
  document.body.classList.toggle('light');
  document.getElementById('themeToggle').textContent = document.body.classList.contains('light') ? '🌙' : '☀️';
  localStorage.setItem('mv2-theme', document.body.classList.contains('light') ? 'light' : 'dark');
  setTimeout(drawAll, 50);
}
if (localStorage.getItem('mv2-theme') === 'light') { document.body.classList.add('light'); document.getElementById('themeToggle').textContent = '🌙'; }

const scenarios = {
  lot: {
    name:'LotFrontage', icon:'🏠', nullPct:17, nullColor:'var(--amber)',
    whyTitle:'WHY is LotFrontage missing 17% of values?',
    whyText:'<strong>Probably RANDOM.</strong> Some property assessors measured the street frontage in feet, others skipped it. There is no systematic pattern — a house with missing LotFrontage is not fundamentally different from one with it. This is the "easy" case.',
    strats:[{id:'dropRows',label:'🗑️ Drop Rows',cls:'btn-drop'},{id:'mean',label:'📊 Fill Mean',cls:'btn-fill'},{id:'median',label:'📐 Fill Median',cls:'btn-fill'},{id:'constant',label:'🖊️ Fill 0',cls:'btn-const'}],
    active:'median',
    verdict:'<h3>✅ Verdict: Fill with MEDIAN</h3><p>Missing at random, 17% is too many rows to throw away but not a structural pattern. <strong>Median is better than mean</strong> because LotFrontage has a long right tail (a few 200ft+ frontages would pull the mean up).</p><div class="rule">🔑 Rule: Skewed numerical feature + random missing → MEDIAN.</div>',
    insights:{
      dropRows:'<span class="r">❌ You threw away 17% of houses.</span> That\'s ~500 homes gone — along with their SalePrice labels. Training data is precious. Don\'t waste it.',
      mean:'<span class="a">⚠️ Every missing house gets the average: 68ft.</span> But the mean is pulled up by a few 200ft+ frontages. A house with a tiny 30ft yard now looks like it has 68ft.',
      median:'<span class="g">✅ Every missing house gets 65ft.</span> The median resists the long tail — the one 300ft mansion doesn\'t affect it. This is the safest choice for skewed data.',
      constant:'<span class="a">⚠️ Every missing house gets 0ft.</span> 0 means "no street frontage" (like a flag lot behind another house). The model now thinks these are flag lots, which sell for LESS. Wrong signal.',
    },
    dataFn: ()=>{ const v=[]; for(let i=0;i<30;i++) v.push({val:30+Math.random()*120, miss:Math.random()<0.17}); return v; },
  },
  garage: {
    name:'GarageYrBlt', icon:'🚗', nullPct:5, nullColor:'var(--red)',
    whyTitle:'WHY is GarageYrBlt missing 5% of values?',
    whyText:'<strong>NOT random. It\'s STRUCTURED.</strong> 81 houses in Ames have NO garage at all. GarageYrBlt is null BECAUSE there is no garage to have a year. The missing value IS the truth: "This house has no garage." If you fill it with a real year like 1978, you are INVENTING a garage that doesn\'t exist.',
    strats:[{id:'dropRows',label:'🗑️ Drop Rows',cls:'btn-drop'},{id:'mean',label:'📊 Fill Mean (1978)',cls:'btn-drop'},{id:'median',label:'📐 Fill Median (1980)',cls:'btn-drop'},{id:'constant',label:'✅ Fill 0 = "No Garage"',cls:'btn-const'}],
    active:'constant',
    verdict:'<h3>✅ Verdict: Fill with 0 ("No Garage")</h3><p>0 is not a real year — no garage was built in year 0. The model learns: <strong>"GarageYrBlt=0 means this house has no garage."</strong> Filling with any real year (like 1978) creates a FAKE garage for 81 houses.</p><div class="rule">🔑 Rule: When missing = a meaningful category → encode it as a special value outside the normal range.</div>',
    insights:{
      dropRows:'<span class="r">❌ You dropped 81 houses.</span> Now your model has ZERO examples of houses without garages. It will assume every house has one — and be wrong on 5% of predictions.',
      mean:'<span class="r">❌ DISASTER. Houses with no garage now have GarageYrBlt=1978.</span> A 2005-built house suddenly has a "garage from 1978." The model learns nonsense patterns.',
      median:'<span class="r">❌ Same problem as mean.</span> Creates fake garage years for houses without garages. The model cannot distinguish "real 1980 garage" from "no garage filled with 1980."',
      constant:'<span class="g">✅ PERFECT. "0" means "no garage."</span> The model now has accurate information: these houses simply don\'t have garages. The missing value WAS the correct answer all along.',
    },
    dataFn: ()=>{ const v=[]; for(let i=0;i<30;i++) v.push(i<2?{val:0,miss:true}:{val:1970+Math.random()*50,miss:false}); return v; },
  },
  fireplace: {
    name:'FireplaceQu', icon:'🔥', nullPct:47, nullColor:'var(--amber)',
    whyTitle:'WHY is FireplaceQu missing 47% of values?',
    whyText:'<strong>NOT random. It\'s STRUCTURED.</strong> 47% of houses in Ames have NO fireplace at all. The remaining 53% have fireplaces rated from Poor to Excellent. "Null" here means "No Fireplace" — a completely valid and meaningful category. It is NOT the same as "Poor quality fireplace."',
    strats:[{id:'dropRows',label:'🗑️ Drop Rows',cls:'btn-drop'},{id:'mode',label:'📊 Fill Mode (Avg)',cls:'btn-drop'},{id:'constant',label:'✅ Fill "None"',cls:'btn-const'},{id:'dropCol',label:'❌ Drop Column',cls:'btn-delete'}],
    active:'constant',
    verdict:'<h3>✅ Verdict: Fill with "None" (make it a category)</h3><p>"No Fireplace" IS a legitimate fireplace situation. By encoding "None" as an explicit category, the model learns: Having NO fireplace ≠ Having a POOR fireplace. These have different effects on house price.</p><div class="rule">🔑 Rule: When a large portion of data is missing because the feature DOESN\'T APPLY → encode "None"/"Not Applicable" as a category.</div>',
    insights:{
      dropRows:'<span class="r">❌ You lost 47% of your data!</span> That\'s 1,377 houses gone. The model only knows about houses WITH fireplaces. Completely biased — it will overprice houses without fireplaces.',
      mode:'<span class="r">❌ You invented fireplaces for 1,377 houses.</span> Every house without a fireplace now appears to have an "Average" quality one. The model can\'t learn that fireplaces ADD value, because it thinks every house has one.',
      constant:'<span class="g">✅ PERFECT. "None" is a real category.</span> The model learns: no fireplace = baseline price. Poor fireplace = small premium. Excellent fireplace = large premium. Accurate and honest.',
      dropCol:'<span class="a">⚠️ You lost useful information.</span> 53% of houses DO have fireplaces, and their quality varies. Dropping the column throws away that signal. Better to encode "None".',
    },
    dataFn: ()=>{ const v=[]; for(let i=0;i<30;i++) v.push(Math.random()<0.47?{val:0,miss:true,label:'None'}:{val:1+Math.floor(Math.random()*5),miss:false,label:['','Po','Fa','TA','Gd','Ex'][1+Math.floor(Math.random()*5)]}); return v; },
  },
  pool: {
    name:'PoolQC', icon:'🏊', nullPct:99.7, nullColor:'var(--red)',
    whyTitle:'WHY is PoolQC missing 99.7% of values?',
    whyText:'<strong>Almost no houses in Ames, Iowa have pools.</strong> Only 8 out of 2,930 houses have a pool. 99.7% of rows are "No Pool." This column has almost ZERO variance — every house is the same. A feature where 99.7% of values are identical contributes nothing to a model.',
    strats:[{id:'dropRows',label:'🗑️ Drop Rows',cls:'btn-drop'},{id:'mode',label:'📊 Fill Mode (None)',cls:'btn-fill'},{id:'constant',label:'🖊️ Fill "None"',cls:'btn-const'},{id:'dropCol',label:'✅ Drop Column',cls:'btn-const'}],
    active:'dropCol',
    verdict:'<h3>✅ Verdict: DROP the column entirely</h3><p>99.7% identical values = almost zero information. The 8 pool-equipped houses (0.3%) are not enough to learn any meaningful pattern about pools. Keeping this column adds noise without signal.</p><div class="rule">🔑 Rule: >95% of values are the same → DROP. The column has no predictive power.</div>',
    insights:{
      dropRows:'<span class="r">❌ Only 8 houses remain!</span> You threw away 99.7% of your data because of one column. The cure is worse than the disease.',
      mode:'<span class="a">⚠️ 99.7% of values are "None."</span> The feature has almost zero variance — it adds no predictive power. Keeping it just adds noise.',
      constant:'<span class="a">⚠️ Same as mode.</span> 99.7% identical. No variance = no learning possible from this column. You\'re carrying dead weight.',
      dropCol:'<span class="g">✅ CORRECT. The column has no useful signal.</span> 8 houses with pools out of 2,930 is not enough data to learn from. Remove it and simplify the model.',
    },
    dataFn: ()=>{ const v=[]; for(let i=0;i<30;i++) v.push({val:0,miss:true,label:'None'}); v[10]={val:3,miss:false,label:'Gd'}; v[22]={val:4,miss:false,label:'Ex'}; return v; },
  },
  electrical: {
    name:'Electrical', icon:'⚡', nullPct:0.03, nullColor:'var(--green)',
    whyTitle:'WHY is Electrical missing 0.03% of values?',
    whyText:'<strong>Data entry error.</strong> Exactly 1 house out of 2,930 has no electrical type recorded. This is a genuine mistake — not a pattern. The most common electrical type is "Circuit Breaker" (standard for modern homes). With only 1 missing value, ANY reasonable strategy works.',
    strats:[{id:'dropRows',label:'🗑️ Drop 1 Row',cls:'btn-fill'},{id:'mode',label:'✅ Fill Mode',cls:'btn-const'},{id:'constant',label:'🖊️ Fill "Unknown"',cls:'btn-fill'}],
    active:'mode',
    verdict:'<h3>✅ Verdict: Fill with MODE ("Circuit Breaker")</h3><p>It\'s 1 house. The cost of imputation is zero. The harm of being wrong about 1 house is zero in a dataset of 2,930. Mode is the simplest correct answer.</p><div class="rule">🔑 Rule: <1% missing → fill with mode/median and move on. Don\'t overthink it.</div>',
    insights:{
      dropRows:'<span class="g">✅ Also fine.</span> Dropping 1 row costs nothing. But imputation is even cheaper and keeps all data.',
      mode:'<span class="g">✅ BEST. One house gets "Circuit Breaker."</span> The model cannot be wrong in any statistically meaningful way about 1 row. Simple, fast, correct.',
      constant:'<span class="a">⚠️ Overkill.</span> Creating a new category "Unknown" for 1 house adds a column for essentially no benefit. Mode is simpler.',
    },
    dataFn: ()=>{ const v=[]; for(let i=0;i<30;i++) v.push({val:1+Math.floor(Math.random()*5),miss:false,label:['','FuseA','FuseP','FuseF','CBrkr','Mix'][1+Math.floor(Math.random()*5)]}); v[15].miss=true; v[15].label='?'; return v; },
  },
};

let cur = 'lot';

function pickScenario(s) {
  cur = s;
  scenarios[s].active = scenarios[s].strats[0].id;
  // Set best strategy as default
  const best = scenarios[s].strats.find(x => x.id === (s==='lot'?'median':s==='garage'?'constant':s==='fireplace'?'constant':s==='pool'?'dropCol':'mode'));
  if (best) scenarios[s].active = best.id;
  renderAll();
}

function pickStrat(id) {
  scenarios[cur].active = id;
  renderAll();
}

function renderAll() {
  renderScenarios();
  renderWhy();
  renderStrats();
  drawAll();
  updateVerdict();
}

function renderScenarios() {
  document.getElementById('scenarioRow').innerHTML = Object.entries(scenarios).map(([k,s]) => `
    <div class="scenario-card ${k===cur?'active':''}" onclick="pickScenario('${k}')">
      <span class="sc-icon">${s.icon}</span>
      <div class="sc-name">${s.name}</div>
      <div class="sc-null" style="color:${s.nullColor}">${s.nullPct}% null</div>
      <div class="sc-tag" style="color:${s.nullColor};background:${s.nullColor}20">${s.nullPct>90?'DROP?':s.nullPct>30?'STRUCTURED?':s.nullPct<1?'TRIVIAL':'RANDOM?'}</div>
    </div>
  `).join('');
}

function renderWhy() {
  const s = scenarios[cur];
  document.getElementById('whyBox').innerHTML = `<h3>🔍 ${s.whyTitle}</h3><p>${s.whyText}</p>`;
}

function renderStrats() {
  const s = scenarios[cur];
  document.getElementById('stratRow').innerHTML = s.strats.map(st =>
    `<button class="strat-btn ${st.cls} ${st.id===s.active?'active':''}" onclick="pickStrat('${st.id}')">${st.label}</button>`
  ).join('');
  // Update label
  const activeStrat = s.strats.find(x=>x.id===s.active);
  document.getElementById('stratLabel').textContent = activeStrat ? activeStrat.label : '';
}

function drawAll() {
  drawBefore();
  drawAfter();
  updateInsight();
}

function drawBefore() {
  const c = document.getElementById('canvasBefore'); if(!c) return;
  const W=420, H=300, ctx=c.getContext('2d'), isL=document.body.classList.contains('light');
  ctx.clearRect(0,0,W,H);

  const s = scenarios[cur], data = s.dataFn();
  const barW=11, gap=3, startX=25, baseY=260;

  // Count present vs missing
  let present=0, missing=0;
  data.forEach(d => d.miss ? missing++ : present++);

  // Draw each house as a bar
  data.forEach((d,i) => {
    const x = startX + i*(barW+gap);
    const h = d.miss ? 20 + Math.random()*10 : 60 + (d.val/(s.name==='LotFrontage'?150:s.name==='GarageYrBlt'?55:5))*160;
    const y = baseY - h;

    if (d.miss) {
      ctx.fillStyle = 'rgba(248,81,73,0.7)';
      ctx.fillRect(x, y, barW, h);
      // Red X on top
      ctx.fillStyle = '#fff'; ctx.font='bold 9px "JetBrains Mono"';
      ctx.fillText('?', x+1, y+h/2+3);
    } else {
      ctx.fillStyle = 'rgba(57,210,255,0.55)';
      ctx.fillRect(x, y, barW, h);
    }
  });

  // Stats
  ctx.font='bold 14px "JetBrains Mono"'; ctx.fillStyle = 'rgba(248,81,73,0.9)';
  ctx.fillText(`${missing}/${data.length} MISSING (${Math.round(missing/data.length*100)}%)`, 20, H-15);

  ctx.font='11px "DM Sans"'; ctx.fillStyle = isL?'rgba(31,35,40,0.5)':'rgba(139,148,158,0.5)';
  ctx.fillText('🔴 = null  🔵 = present', 280, H-15);

  // Labels
  ctx.font='bold 12px "JetBrains Mono"'; ctx.fillStyle = isL?'rgba(31,35,40,0.7)':'rgba(230,237,243,0.6)';
  ctx.fillText(s.name, 15, 25);
  ctx.font='10px "DM Sans"'; ctx.fillText(`(each bar = one house)`, 15, 42);
}

function drawAfter() {
  const c = document.getElementById('canvasAfter'); if(!c) return;
  const W=420, H=300, ctx=c.getContext('2d'), isL=document.body.classList.contains('light');
  ctx.clearRect(0,0,W,H);

  const s = scenarios[cur], data = s.dataFn(), strat = s.active;
  const barW=11, gap=3, startX=25, baseY=260;

  // Compute fill values
  let fillVal = 0;
  const presentVals = data.filter(d=>!d.miss).map(d=>d.val);
  if (strat==='mean') fillVal = Math.round(presentVals.reduce((a,b)=>a+b,0)/presentVals.length);
  else if (strat==='median') { const sorted=[...presentVals].sort((a,b)=>a-b); fillVal = Math.round(sorted[Math.floor(sorted.length/2)]); }
  else if (strat==='mode') {
    const counts={}; presentVals.forEach(v=>counts[v]=(counts[v]||0)+1);
    fillVal = +Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
  }
  else if (strat==='constant') fillVal = s.name==='GarageYrBlt'?0:0;
  const constLabel = s.name==='GarageYrBlt'?'0':'None';

  // Drop col?
  if (strat === 'dropCol') {
    ctx.font='bold 18px "JetBrains Mono"'; ctx.fillStyle = 'rgba(248,81,73,0.4)';
    ctx.fillText('COLUMN REMOVED', 80, 140);
    ctx.fillText('FROM DATASET', 105, 175);
  } else {
    data.forEach((d,i) => {
      const x = startX + i*(barW+gap);
      const wasMissing = d.miss;
      const v = wasMissing ? (strat==='dropRows'?null:fillVal) : d.val;
      if (strat==='dropRows' && wasMissing) return; // dropped row

      const h = wasMissing ? 40 : 60+(v/(s.name==='LotFrontage'?150:s.name==='GarageYrBlt'?55:5))*160;
      const y = baseY - h;

      if (wasMissing) {
        ctx.fillStyle = 'rgba(255,179,71,0.7)';
        ctx.fillRect(x, y, barW, h);
        ctx.strokeStyle = 'rgba(255,179,71,0.5)'; ctx.lineWidth=2; ctx.setLineDash([3,2]);
        ctx.strokeRect(x, y, barW, h); ctx.setLineDash([]);
      } else {
        ctx.fillStyle = 'rgba(57,210,255,0.55)';
        ctx.fillRect(x, y, barW, h);
      }
    });

    ctx.font='11px "DM Sans"'; ctx.fillStyle = isL?'rgba(31,35,40,0.5)':'rgba(139,148,158,0.5)';
    ctx.fillText('🟡 dashed = was missing, now filled', 20, H-15);

    if (strat==='dropRows') {
      const kept = data.filter(d=>!(d.miss)).length;
      ctx.fillText(`Kept: ${kept}/${data.length} rows`, 310, H-15);
    }
  }

  ctx.font='bold 12px "JetBrains Mono"'; ctx.fillStyle = isL?'rgba(31,35,40,0.7)':'rgba(230,237,243,0.6)';
  ctx.fillText(s.name + ' — ' + strat, 15, 25);
}

function updateInsight() {
  const s = scenarios[cur];
  document.getElementById('insight').innerHTML = s.insights[s.active] || '';
}

function updateVerdict() {
  document.getElementById('verdict').innerHTML = scenarios[cur].verdict;
}

// Init
pickScenario('lot');
</script>
